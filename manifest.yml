# Agentic Engineering Framework — manifest.yml
# Universal machine-readable project entry point
# https://github.com/Spree-Finance/AgenticEngineeringFramework
# Generated by /prime on 2026-07-21 — edit freely. Re-run /prime to refresh.

framework_version: "0.0.0"

project:
  name: "reach-lang"
  description: "Reach — a domain-specific language and verifying compiler for building safe decentralized applications (DApps) that deploy to Ethereum-like networks and Algorand from a single source program."
  language: "Haskell (stack/GHC) + TypeScript"
  framework: ""
  repository_type: "monorepo"

entry_points:
  readme: "README.md"
  agents: "AGENTS.md"
  env: ".env"
  manifest: "manifest.yml"

paths:
  source: "hs/"
  tests: "hs/test/"
  docs: "docs/"
  scripts: "scripts/"
  adws: ".adws/"

# Major components (monorepo layout)
components:
  compiler:
    path: "hs/"
    entry: "hs/app/reachc/Main.hs"
    what: "Reach compiler (reachc), CLI (reach, reach-cli), verifier integration"
  js-runtime:
    path: "js/stdlib/"
    entry: "js/stdlib/index.ts"
    what: "JavaScript/TypeScript standard library and runtime for compiled DApps"
  cli-wrapper:
    path: "reach"
    entry: "reach"
    what: "POSIX sh entry script users invoke; drives Docker images"
  docs:
    path: "docs/"
    entry: "docs/src"
    what: "Documentation site source (docs.reach.sh)"
  examples:
    path: "examples/"
    entry: "examples/"
    what: "~255 example DApps used as integration tests"
  rpc-client:
    path: "rpc-client/"
    entry: "rpc-client/"
    what: "RPC client libraries: C#, Go, JS, Python"
  vscode-extension:
    path: "vsce/"
    entry: "vsce/package.json"
    what: "VS Code extension (syntax, LSP client)"
  simulator:
    path: "simulator/"
    entry: "simulator/"
    what: "Reach program simulator (client + language server)"

# Validation commands (used by slash commands).
# Haskell builds are long (cold stack build can exceed 30 min); js/docs builds require a running Docker daemon.
validation:
  test: "cd hs && make hs-test"
  test-accept: "cd hs && make hs-test-accept"
  lint: "make sh-lint"            # requires shellcheck
  format: "cd hs && make hs-format"  # ormolu, formats in place (no check-only mode)
  typecheck: "cd hs && make hs-check"  # stack build --fast + stack test --no-run-tests
  build: "cd hs && make hs-build"
  expand: "cd hs && make expand"  # fast sanity check: generates package.yaml, Version.hs, sol/stdlib.sol

run:
  compile-example: "./reach compile examples/argz/index.rsh"
  compile-sol-example: "REACH_DOCKER=0 ./reach sol examples/verified-solidity/index.rsh"  # verified-Solidity mode: emits .sol + .abi.json + .verify.json, ETH connector only
  docs-build: "cd docs && make build"   # Docker required
  docs-serve: "cd docs && make serve-up"  # serves at http://localhost:8080
  docker-images: "make"                 # routine-build: builds all reachsh/* Docker images
