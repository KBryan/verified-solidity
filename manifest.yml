# Agentic Engineering Framework — manifest.yml
# Universal machine-readable project entry point
# https://github.com/Spree-Finance/AgenticEngineeringFramework
# Generated by /prime on 2026-07-22 (restored from pre-install backup and refreshed) — edit freely. Re-run /prime to refresh.

# Stamped with the adws package version that initialized this project.
# `adws upgrade` will stamp it; `adws status` compares it against the installed CLI.
framework_version: "0.0.0"

project:
  name: "verified-solidity"
  description: "Write a smart contract once, get formally verified Solidity out. An independent continuation of the Reach language and verifying compiler with a modernized toolchain (solc 0.8.26, z3 4.12.5, GHC 9.6.7) and a first-class verified-Solidity output mode: Z3-based formal verification on every compile, emitting .sol + ABI + verification report only when verification succeeds."
  language: "Haskell (stack/GHC 9.6.7) + TypeScript"
  framework: ""
  repository_type: "monorepo"

entry_points:
  readme: "README.md"
  agents: "AGENTS.md"
  env: ".env"
  manifest: "manifest.yml"

paths:
  source: "hs/"
  tests: "hs/test/"
  docs: "docs/"
  scripts: "scripts/"
  adws: ".adws/"

# Major components (monorepo layout)
components:
  compiler:
    path: "hs/"
    entry: "hs/app/reachc/Main.hs"
    what: "Reach compiler (reachc) with verified-Solidity mode (--sol), CLI (reach, reach-cli), Z3 verifier integration"
  js-runtime:
    path: "js/stdlib/"
    entry: "js/stdlib/index.ts"
    what: "JavaScript/TypeScript standard library and runtime for compiled DApps"
  cli-wrapper:
    path: "reach"
    entry: "reach"
    what: "POSIX sh entry script users invoke; `reach sol` drives the verified-Solidity path (no Docker with REACH_DOCKER=0)"
  reach-sol:
    path: "scripts/reach-sol"
    entry: "scripts/reach-sol"
    what: "Standalone verified-Solidity compile driver"
  docs:
    path: "docs/"
    entry: "docs/src"
    what: "Documentation site source"
  specs:
    path: "specs/"
    entry: "specs/verified-solidity-compiler.md"
    what: "Design specs (verified-Solidity compiler, toolchain upgrade phases)"
  examples:
    path: "examples/"
    entry: "examples/verified-solidity/index.rsh"
    what: "~255 example DApps used as integration tests; examples/verified-solidity is the worked verified-Solidity example with a Foundry deploy test"
  rpc-client:
    path: "rpc-client/"
    entry: "rpc-client/"
    what: "RPC client libraries: C#, Go, JS, Python"
  vscode-extension:
    path: "vsce/"
    entry: "vsce/package.json"
    what: "VS Code extension (syntax, LSP client)"
  simulator:
    path: "simulator/"
    entry: "simulator/"
    what: "Reach program simulator (client + language server)"

# Validation commands (used by slash commands).
# Haskell builds are long (cold stack build can exceed 30 min); full hs-test needs a
# Docker-backed `goal` shim for ALGO tests; js/docs builds require a running Docker daemon.
validation:
  test: "cd hs && make hs-test"
  test-accept: "cd hs && make hs-test-accept"   # HAZARD: corrupts t/n goldens if Docker/goal is down — see AGENTS.md
  lint: "make sh-lint"                # requires shellcheck (installed)
  format: "cd hs && make hs-format"   # ormolu fork built in hs/ormolu-tool/, formats in place (no check-only mode)
  typecheck: "cd hs && make hs-check" # stack build --fast + stack test --no-run-tests
  build: "cd hs && make hs-build"
  expand: "cd hs && make expand"      # fast sanity check: generates package.yaml, Version.hs, sol/stdlib.sol (needs working mo — see AGENTS.md Known Issues)

run:
  compile-sol-example: "REACH_DOCKER=0 ./reach sol examples/verified-solidity/index.rsh"  # emits .sol + .abi.json + .verify.json into build/
  foundry-test: "examples/verified-solidity/foundry-test/run.sh"  # deploy test against the emitted .sol (forge installed)
  compile-example: "REACH_DOCKER=0 ./reach compile examples/argz/index.rsh"
  docs-build: "cd docs && make build"     # Docker required
  docs-serve: "cd docs && make serve-up"  # serves at http://localhost:8080
  docker-images: "make"                   # routine-build: builds all reachsh/* Docker images
